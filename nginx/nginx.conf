events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Phase 1: Static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Resume download endpoint
        location /resume.pdf {
            alias /usr/share/nginx/html/resume.pdf;
            add_header Content-Type application/pdf;
            add_header Content-Disposition "attachment; filename=\"SHIVAM_UPADHYAY_Resume.pdf\"";
        }

        # Resume upload endpoint (Phase 2 preparation)
        location /upload-resume {
            return 404; # Not implemented in Phase 1
        }

        # Future Phase 3: Backend proxy (commented for now)
        # location /api/ {
        #     proxy_pass http://backend:3000/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_cache_bypass $http_upgrade;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}