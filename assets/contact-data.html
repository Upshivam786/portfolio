<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Submissions - SHIVAM UPADHYAY</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .contact-admin {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
        }
        .contact-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        .contact-table th,
        .contact-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .contact-table th {
            background: var(--background-alt);
            font-weight: 600;
            color: var(--text-primary);
        }
        .contact-table tr:hover {
            background: var(--background-alt);
        }
        .no-submissions {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .export-btn {
            margin: 1rem 0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">
                <a href="../index.html" class="brand-link">← Back to Portfolio</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-admin">
            <h2>Contact Submissions</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                View and manage contact form submissions from your portfolio.
            </p>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalSubmissions">0</div>
                    <div class="stat-label">Total Submissions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="thisMonth">0</div>
                    <div class="stat-label">This Month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="thisWeek">0</div>
                    <div class="stat-label">This Week</div>
                </div>
            </div>

            <button class="btn btn-primary export-btn" onclick="exportToCSV()">
                📥 Export to CSV
            </button>

            <div id="submissionsList">
                <div class="no-submissions">
                    <p>No contact submissions yet.</p>
                    <p>Submissions will appear here when visitors fill out the contact form.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Load contact submissions from localStorage
        function loadSubmissions() {
            const submissions = JSON.parse(localStorage.getItem('contacts') || '[]');
            const submissionsList = document.getElementById('submissionsList');
            const totalSubmissions = document.getElementById('totalSubmissions');
            const thisMonth = document.getElementById('thisMonth');
            const thisWeek = document.getElementById('thisWeek');

            if (submissions.length === 0) {
                submissionsList.innerHTML = `
                    <div class="no-submissions">
                        <p>No contact submissions yet.</p>
                        <p>Submissions will appear here when visitors fill out the contact form.</p>
                    </div>
                `;
                return;
            }

            // Update stats
            totalSubmissions.textContent = submissions.length;
            
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const weekStart = new Date(now.setDate(now.getDate() - now.getDay()));
            
            thisMonth.textContent = submissions.filter(s => new Date(s.timestamp) >= monthStart).length;
            thisWeek.textContent = submissions.filter(s => new Date(s.timestamp) >= weekStart).length;

            // Create table
            let tableHTML = `
                <table class="contact-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            submissions.reverse().forEach((submission, index) => {
                const date = new Date(submission.timestamp);
                const formattedDate = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                tableHTML += `
                    <tr>
                        <td>${formattedDate}</td>
                        <td>${submission.name}</td>
                        <td>
                            <a href="mailto:${submission.email}" class="contact-link">${submission.email}</a>
                        </td>
                        <td>
                            <button class="btn btn-outline" onclick="deleteSubmission(${submissions.length - 1 - index})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            submissionsList.innerHTML = tableHTML;
        }

        // Delete submission
        function deleteSubmission(index) {
            if (confirm('Are you sure you want to delete this submission?')) {
                const submissions = JSON.parse(localStorage.getItem('contacts') || '[]');
                submissions.splice(index, 1);
                localStorage.setItem('contacts', JSON.stringify(submissions));
                loadSubmissions();
            }
        }

        // Export to CSV
        function exportToCSV() {
            const submissions = JSON.parse(localStorage.getItem('contacts') || '[]');
            
            if (submissions.length === 0) {
                alert('No submissions to export');
                return;
            }

            let csv = 'Date,Name,Email\n';
            
            submissions.forEach(submission => {
                const date = new Date(submission.timestamp).toLocaleString();
                const name = `"${submission.name.replace(/"/g, '""')}"`;
                const email = `"${submission.email.replace(/"/g, '""')}"`;
                csv += `${date},${name},${email}\n`;
            });

            // Download CSV
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `contact_submissions_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Load submissions on page load
        document.addEventListener('DOMContentLoaded', loadSubmissions);
    </script>
</body>
</html>
